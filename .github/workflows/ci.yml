name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
env:
  FRONTEND_PATH: ./SavingsTracker.Frontend
  GOAL_DB_MANAGER_PATH: ./SavingsTracker.GoalDbManager
  GOAL_SERVICE_PATH: ./SavingsTracker.GoalService
jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.FRONTEND_PATH }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Run ESLint
        run: npm run lint
  typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.FRONTEND_PATH }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Generate route types
        run: npm run build
      - name: Typecheck
        run: npm run typecheck
  vitest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.FRONTEND_PATH }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Run Vitest tests
        run: npm run test
  playwright:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.FRONTEND_PATH }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
      - name: Install Aspire CLI
        run: dotnet tool install --global Aspire.Cli
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Run Playwright tests
        run: npm run test:e2e
      - uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: ${{ env.FRONTEND_PATH }}/playwright-report/
          retention-days: 30
  deploy-db:
    needs: [lint, typecheck, vitest, playwright]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.GOAL_DB_MANAGER_PATH }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
      - name: Migrate and seed
        run: dotnet run --configuration Release
        env:
          ConnectionStrings__goaldb: ${{ secrets.NEON_CONNECTION_STRING }}
  deploy-api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.GOAL_SERVICE_PATH }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
      - uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Publish
        run: dotnet publish
      - name: Deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: savings-tracker-api
          package: ./bin/Release/net10.0/publish
  deploy-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.FRONTEND_PATH }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Deploy
        run: npx netlify deploy --prod
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
